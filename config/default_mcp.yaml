llm:
  model_id: "Qwen/Qwen3-8B"
  backend: "transformers"  # "transformers" or "vllm" (vllm needs Blackwell-compatible build)
  device_map: "balanced"
  torch_dtype: "auto"
  max_new_tokens: 2048
  temperature: 0.7
  reasoning_effort: "medium"
  reliability:
    max_retries: 3
    strict_tool_schemas: true
    first_step_guardrail: true

mcp:
  mode: "real"
  servers:
    - url: "http://127.0.0.1:8200/mcp"
      transport: "streamable-http"

agents_config: "config/agents_mcp.yaml"
coordination_config: "config/coordination_mcp.yaml"

logging:
  level: "INFO"
  output_dir: "logs/"
  save_full_history: true

ui:
  enabled: true
  port: 8501
